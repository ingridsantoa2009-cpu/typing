<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Typing da Ingrid 💙</title>

<style>
body {
  background: #0f172a;
  color: #e2e8f0;
  font-family: Arial;
  text-align: center;
  padding: 30px;
}

h1 {
  margin-bottom: 10px;
}

#info {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 10px;
}

#texto {
  max-width: 700px;
  margin: 20px auto;
  font-size: 22px;
  line-height: 1.6;
}

.letra {
  color: #64748b;
}

.correta {
  color: #22c55e;
}

.errada {
  color: #ef4444;
}

.ativa {
  border-bottom: 2px solid white;
}

input {
  width: 70%;
  padding: 10px;
  font-size: 18px;
  border-radius: 6px;
  border: none;
  margin-top: 20px;
}

#resultado {
  margin-top: 20px;
  font-size: 20px;
}

#progresso-container {
  width: 70%;
  height: 8px;
  background: #1e293b;
  margin: 10px auto;
  border-radius: 5px;
}

#progresso {
  height: 100%;
  width: 0%;
  background: #22c55e;
  border-radius: 5px;
  transition: 0.2s;
}
</style>

</head>

<body>

<h1>💻 Teste de Digitação</h1>

<div id="info">
  <span>⏱️ Tempo: <span id="tempo">0.0</span>s</span>
  <span>⚡ WPM: <span id="wpm">0</span></span>
  <span>🎯 Precisão: <span id="precisao">100</span>%</span>
</div>

<div id="progresso-container">
  <div id="progresso"></div>
</div>

<div id="texto"></div>

<input type="text" id="input" placeholder="Comece a digitar..." autofocus>

<div id="resultado"></div>

<audio id="som" src="https://www.soundjay.com/mechanical/keyboard-1.mp3"></audio>

<script>
const textoOriginal = "você é especial e talvez não saiba o quanto isso significa pra mim";
const textoContainer = document.getElementById("texto");
const input = document.getElementById("input");

const tempoEl = document.getElementById("tempo");
const wpmEl = document.getElementById("wpm");
const precisaoEl = document.getElementById("precisao");
const resultado = document.getElementById("resultado");
const progresso = document.getElementById("progresso");
const som = document.getElementById("som");

let inicio = null;
let intervalo;
let erros = 0;

// criar letras
textoOriginal.split("").forEach((letra, index) => {
  const span = document.createElement("span");
  span.innerText = letra;
  span.classList.add("letra");
  if(index === 0) span.classList.add("ativa");
  textoContainer.appendChild(span);
});

const letras = document.querySelectorAll(".letra");

input.addEventListener("input", () => {

  if (!inicio) {
    inicio = new Date();
    intervalo = setInterval(atualizarTempo, 100);
  }

  som.currentTime = 0;
  som.play();

  const valor = input.value;
  erros = 0;

  letras.forEach((span, index) => {
    const letraDigitada = valor[index];

    span.classList.remove("ativa");

    if (letraDigitada == null) {
      span.classList.remove("correta", "errada");
    } else if (letraDigitada === span.innerText) {
      span.classList.add("correta");
      span.classList.remove("errada");
    } else {
      span.classList.add("errada");
      span.classList.remove("correta");
      erros++;
    }

    if(index === valor.length) {
      span.classList.add("ativa");
    }
  });

  // progresso
  const progressoValor = (valor.length / textoOriginal.length) * 100;
  progresso.style.width = progressoValor + "%";

  // precisão
  const precisao = ((valor.length - erros) / valor.length) * 100 || 100;
  precisaoEl.innerText = Math.round(precisao);

  // WPM
  const tempo = (new Date() - inicio) / 1000;
  const palavras = valor.trim().split(" ").length;
  const wpm = Math.round((palavras / tempo) * 60) || 0;
  wpmEl.innerText = wpm;

  if (valor === textoOriginal) {
    finalizar();
  }

});

function atualizarTempo() {
  const tempo = (new Date() - inicio) / 1000;
  tempoEl.innerText = tempo.toFixed(1);
}

function finalizar() {
  clearInterval(intervalo);

  const tempoFinal = tempoEl.innerText;
  const wpmFinal = wpmEl.innerText;
  const precisaoFinal = precisaoEl.innerText;

  resultado.innerHTML = `
    🎉 Finalizado! <br><br>
    ⏱️ ${tempoFinal}s <br>
    ⚡ ${wpmFinal} WPM <br>
    🎯 ${precisaoFinal}% precisão <br><br>
    💙 você digitou tudo... mas será que sentiu também?
  `;
}
</script>

</body>
</html>
