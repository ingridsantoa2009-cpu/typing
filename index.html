<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Typing da Ingrid 💙</title>

<style>
body {
  background: #1e1e1e;
  color: #ccc;
  font-family: monospace;
  padding: 40px;
}

/* caixa do texto */
#container {
  background: #2a2a2a;
  padding: 20px;
  border-radius: 10px;
  max-width: 800px;
  margin: auto;
  line-height: 1.8;
  font-size: 22px;
}

/* letras */
.letra {
  color: #777;
}

.correta {
  color: #3b82f6; /* azul */
}

.errada {
  color: #ef4444; /* vermelho */
}

.ativa {
  border-bottom: 2px solid #3b82f6;
}

/* input invisível */
#input {
  opacity: 0;
  position: absolute;
}

/* resultado */
#resultado {
  text-align: center;
  margin-top: 30px;
  font-size: 20px;
}
</style>

</head>

<body>

<div id="container">
  <div id="texto"></div>
</div>

<input type="text" id="input" autofocus>

<div id="resultado"></div>

<script>
const textoOriginal = `In today's increasingly hectic and stressful world, getting a spa treatment is sometimes one of the most therapeutic things an individual can enjoy. The relaxation and peaceful environment associated with a spa can allow a person to regain their sense of balance.`;

const textoDiv = document.getElementById("texto");
const input = document.getElementById("input");
const resultado = document.getElementById("resultado");

let inicio = null;
let erros = 0;

// criar letras
textoOriginal.split("").forEach((letra, index) => {
  const span = document.createElement("span");
  span.innerText = letra;
  span.classList.add("letra");

  if (index === 0) span.classList.add("ativa");

  textoDiv.appendChild(span);
});

const letras = document.querySelectorAll(".letra");

// focar automaticamente
document.body.addEventListener("click", () => input.focus());

input.addEventListener("input", () => {

  if (!inicio) inicio = new Date();

  const valor = input.value;
  erros = 0;

  letras.forEach((span, index) => {
    const letraDigitada = valor[index];

    span.classList.remove("ativa");

    if (letraDigitada == null) {
      span.classList.remove("correta", "errada");
    } 
    else if (letraDigitada === span.innerText) {
      span.classList.add("correta");
      span.classList.remove("errada");
    } 
    else {
      span.classList.add("errada");
      span.classList.remove("correta");
      erros++;
    }

    if (index === valor.length) {
      span.classList.add("ativa");
    }
  });

  // terminou (mesmo com erro)
  if (valor.length >= textoOriginal.length) {
    finalizar(valor);
  }
});

function finalizar(valor) {
  const fim = new Date();
  const tempo = (fim - inicio) / 1000;

  const totalCaracteres = textoOriginal.length;
  const acertos = totalCaracteres - erros;
  const precisao = (acertos / totalCaracteres) * 100;

  const palavras = textoOriginal.split(" ").length;
  const wpm = Math.round((palavras / tempo) * 60);

  resultado.innerHTML = `
    🎉 Finalizado! <br><br>
    ⏱️ Tempo: ${tempo.toFixed(2)}s <br>
    ⚡ Velocidade: ${wpm} WPM <br>
    ❌ Erros: ${erros} <br>
    🎯 Precisão: ${precisao.toFixed(1)}% <br><br>
    💙 você terminou... mesmo com erros 😏
  `;

  input.disabled = true;
}
</script>

</body>
</html>
