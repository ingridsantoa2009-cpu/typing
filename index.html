<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Surpresa 🎁</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    overflow:hidden;
    background:#e6f0ff;
}

/* ===== TELA INICIAL ===== */
#tela{
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

#presente{
    width:120px;
    margin-bottom:20px;
}

#mensagem{
    font-size:22px;
    text-align:center;
}

#barra{
    width:250px;
    height:12px;
    background:#ccc;
    margin-top:20px;
    border-radius:10px;
}

#progresso{
    height:100%;
    width:0%;
    background:#4da6ff;
    border-radius:10px;
}

/* ===== POPUPS ===== */
.popup{
    position:absolute;
    width:260px;
    background:white;
    border:1px solid #999;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
    padding:10px;
    font-size:14px;
}

.top-left{ top:5%; left:5%; }
.top-right{ top:5%; right:5%; }
.bottom-left{ bottom:5%; left:5%; }
.bottom-right{ bottom:5%; right:5%; }
.center{ top:40%; left:40%; }

.popup h3{
    margin:0;
    font-size:14px;
    background:#f0f0f0;
    padding:5px;
}

.popup button{
    margin-top:10px;
    float:right;
}

/* ===== HACK ===== */
#hack{
    position:fixed;
    width:100%;
    height:100%;
    background:#030000;
    color:#ff4d4d;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

#hack h2{
    color:#ff1a1a;
}

#timerFinal{
    font-size:90px;
    margin-top:20px;
    color:red;
}

/* ===== POPUPS FINAIS ===== */
.popupFinal{
    position:absolute;
    width:220px;
    background:#1a0000;
    border:2px solid red;
    box-shadow:0 0 20px red;
    color:white;
    padding:10px;
    font-size:13px;
    animation:tremer 0.12s infinite;
}

@keyframes tremer{
    0%{transform:translate(0,0);}
    25%{transform:translate(2px,-2px);}
    50%{transform:translate(-2px,2px);}
    75%{transform:translate(2px,2px);}
    100%{transform:translate(0,0);}
}

/* ===== RESETANDO ===== */
#resetando{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    color:white;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.loader{
    margin-top:20px;
    width:40px;
    height:40px;
    border:4px solid #ccc;
    border-top:4px solid #4da6ff;
    border-radius:50%;
    animation:girar 1s linear infinite;
}

@keyframes girar{
    0%{transform:rotate(0);}
    100%{transform:rotate(360deg);}
}

/* ===== FINAL ===== */
#final{
    position:fixed;
    width:100%;
    height:100%;
    background:#e6f0ff;
    display:none;
    justify-content:center;
    align-items:center;
    font-size:40px;
    color:#333;
}

</style>
</head>

<body>

<!-- INÍCIO -->
<div id="tela">
    <img id="presente" src="https://cdn-icons-png.flaticon.com/512/869/869636.png">
    <div id="mensagem">Preparando algo especial...</div>
    <div id="barra"><div id="progresso"></div></div>
</div>

<!-- HACK -->
<div id="hack">
    <h2>⚠ ACESSO NÃO AUTORIZADO</h2>
    <p>Sistema comprometido.</p>
    <p>Todos os arquivos serão apagados.</p>
    <div id="timerFinal">00:10</div>
</div>

<!-- RESETANDO -->
<div id="resetando">
    <h2>Resetando o sistema...</h2>
    <div class="loader"></div>
</div>

<!-- FINAL -->
<div id="final">
    ingrid trolou você 💙
</div>

<script>

/* ===== CARREGAMENTO ===== */
let progresso = 0;
const barra = document.getElementById("progresso");
const msg = document.getElementById("mensagem");

let load = setInterval(()=>{
    progresso += Math.random()*10;
    barra.style.width = progresso + "%";

    if(progresso >= 100){
        clearInterval(load);
        msg.innerHTML = "💙 eu preparei isso com carinho pra você...";
        setTimeout(iniciarLeves, 5000);
    }
},400);


/* ===== POPUPS ===== */
let posicoes = ["top-left","top-right","bottom-left","bottom-right","center"];
let posIndex = 0;

function criarPopup(texto){
    const p = document.createElement("div");
    p.className = "popup " + posicoes[posIndex];
    posIndex = (posIndex + 1) % posicoes.length;

    p.innerHTML = `
        <h3>Sistema</h3>
        <p>${texto}</p>
        <button>OK</button>
    `;

    p.querySelector("button").onclick = () => p.remove();

    document.body.appendChild(p);
}

/* LEVES */
function iniciarLeves(){
    let msgs = ["Carregando conteúdo...","Sincronizando dados...","Aplicando configurações..."];
    let i = 0;

    let intervalo = setInterval(()=>{
        if(i >= msgs.length){
            clearInterval(intervalo);
            setTimeout(iniciarPesados, 5000);
            return;
        }
        criarPopup(msgs[i]);
        i++;
    },2000);
}

/* PESADOS */
function iniciarPesados(){
    let msgs = ["Erro inesperado detectado.","Falha no sistema.","Arquivo corrompido.","Permissões alteradas."];
    let i = 0;

    let intervalo = setInterval(()=>{
        if(i >= msgs.length){
            clearInterval(intervalo);
            iniciarHack();
            return;
        }
        criarPopup(msgs[i]);
        i++;
    },1500);
}

/* LIMPAR */
function limparPopups(){
    document.querySelectorAll(".popup").forEach(p=>p.remove());
}

/* POPUPS FINAIS */
function criarPopupFinal(){
    const p = document.createElement("div");
    p.className = "popupFinal";

    let posicoes = [
        {top:"2%", left:"2%"},
        {top:"2%", right:"2%"},
        {bottom:"2%", left:"2%"},
        {bottom:"2%", right:"2%"},
        {top:"40%", left:"2%"},
        {top:"40%", right:"2%"}
    ];

    let pos = posicoes[Math.floor(Math.random()*posicoes.length)];
    Object.assign(p.style, pos);

    p.innerHTML = `<b>ERRO CRÍTICO</b><br>Sistema comprometido`;
    document.body.appendChild(p);
}

/* HACK FINAL */
function iniciarHack(){
    limparPopups();

    document.getElementById("tela").style.display = "none";
    document.getElementById("hack").style.display = "flex";

    let tempo = 10;

    for(let i=0;i<6;i++) criarPopupFinal();

    let caos = setInterval(()=>criarPopupFinal(),400);

    let timer = setInterval(()=>{
        document.getElementById("timerFinal").innerText =
            "00:" + String(tempo).padStart(2,'0');

        tempo--;

        if(tempo < 0){
            clearInterval(timer);
            clearInterval(caos);
            iniciarReset();
        }
    },1000);
}

/* RESET */
function iniciarReset(){
    document.querySelectorAll(".popupFinal").forEach(p=>p.remove());
    document.getElementById("hack").style.display = "none";
    document.getElementById("resetando").style.display = "flex";

    setTimeout(()=>{
        document.getElementById("resetando").style.display = "none";
        document.getElementById("final").style.display = "flex";
    },5000);
}

</script>

</body>
</html>
