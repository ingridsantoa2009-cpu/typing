<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Surpresa</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    overflow:hidden;
    background:url('https://images.unsplash.com/photo-1607082349566-187342175e2f') center/cover no-repeat;
}

/* CAMADA ESCURA */
#overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

/* TELA */
#tela{
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
}

/* TEXTO */
#mensagem{
    font-size:22px;
    text-align:center;
    margin-bottom:10px;
}

/* CONTADOR */
#contador{
    font-size:28px;
    color:#ff4d4d;
    margin-bottom:20px;
}

/* BARRA */
#barra{
    width:60%;
    height:18px;
    border:1px solid #ccc;
    background:#222;
}

#progresso{
    height:100%;
    width:0%;
    background:#ff4d4d;
}

/* POPUP REALISTA */
.popup{
    position:absolute;
    width:280px;
    background:#f1f1f1;
    border:1px solid #999;
    box-shadow:0 0 8px rgba(0,0,0,0.5);
    padding:10px;
    font-size:14px;
    color:black;
}

.popup h3{
    margin:0;
    font-size:14px;
    background:#e6e6e6;
    padding:5px;
}

.popup button{
    margin-top:10px;
    float:right;
    padding:4px 10px;
    cursor:pointer;
}

</style>
</head>

<body>

<div id="overlay"></div>

<div id="tela">
    <div id="mensagem">Carregando seu presente...</div>
    <div id="contador">05:00</div>
    <div id="barra">
        <div id="progresso"></div>
    </div>
</div>

<script>

let progresso = 0;
let tempo = 300;

const barra = document.getElementById("progresso");
const msg = document.getElementById("mensagem");

/* CONTADOR */
setInterval(()=>{
    let min = Math.floor(tempo/60);
    let seg = tempo % 60;

    document.getElementById("contador").innerText =
        String(min).padStart(2,'0') + ":" + String(seg).padStart(2,'0');

    tempo--;

    if(tempo <= 0){
        msg.innerText = "Iniciando reset de segurança...";
        criarMuitos();
    }

},1000);


/* PROGRESSO */
let intervalo = setInterval(()=>{
    progresso += Math.random()*8;
    barra.style.width = progresso + "%";

    if(progresso > 30){
        msg.innerText = "Preparando arquivos do presente...";
    }

    if(progresso > 60){
        msg.innerText = "Finalizando surpresa...";
    }

    if(progresso > 80){
        msg.innerText = "Erro inesperado detectado";
        criarPopupReset();
    }

    if(progresso >= 100){
        clearInterval(intervalo);
        msg.innerText = "Falha no sistema";
    }

},500);


/* POPUP RESET */
function criarPopupReset(){
    const p = document.createElement("div");
    p.className = "popup";

    p.style.top = Math.random()*70 + "%";
    p.style.left = Math.random()*70 + "%";

    p.innerHTML = `
        <h3>Sistema</h3>
        <p>O dispositivo encontrou um problema e precisa ser reiniciado.</p>
        <p>Modo de segurança será iniciado automaticamente.</p>
        <button>OK</button>
    `;

    p.querySelector("button").onclick = () => {
        p.remove();
        criarPopupReset();
    };

    document.body.appendChild(p);
}


/* MAIS POPUPS */
function criarMuitos(){
    setInterval(()=>{
        criarPopupReset();
    },1500);
}

</script>

</body>
</html>
