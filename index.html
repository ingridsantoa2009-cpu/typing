<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Typing da Ingrid 💙</title>

<style>
body {
  background: #ffffff;
  color: #333;
  font-family: "Segoe UI", Arial, sans-serif;
  margin: 0;
}

/* barra topo */
#topo {
  background: linear-gradient(to right, #2ea3c9, #1e7fa3);
  color: white;
  text-align: center;
  padding: 15px;
  font-size: 20px;
  font-weight: 600;
}

/* container */
#container {
  position: relative;
  background: #e5e7eb;
  padding: 60px; /* maior */
  border-radius: 15px;
  width: calc(100% - 160px); /* ~4 dedos menor que a tela */
  margin: 40px auto 20px auto;
  font-size: 42px; /* fonte maior */
  font-family: monospace;
  line-height: 2.4; /* acompanha o tamanho */
  overflow: hidden;
}

/* LINHAS (NÃO ALTERADO) */
#container::after {
  content: "";
  position: absolute;
  top: 60px;
  left: 60px;
  right: 60px;
  bottom: 60px;
  pointer-events: none;

  background-image: linear-gradient(#d1d5db 1px, transparent 1px);
  background-size: 100% 2.4em;
}

/* texto */
#texto {
  position: relative;
  z-index: 1;
}

/* letras */
.letra {
  color: #999;
}

.correta {
  color: #3b82f6;
}

.errada {
  color: #ef4444;
}

.ativa {
  border-bottom: 2px solid #3b82f6;
}

/* input invisível */
#input {
  opacity: 0;
  position: absolute;
}

/* resultado */
#resultado {
  background: #bfdbfe;
  color: #1e3a8a;
  padding: 25px;
  border-radius: 15px;
  max-width: 600px;
  margin: 20px auto;
  font-size: 20px;
  line-height: 1.8;
  display: none;
  text-align: center;
}
</style>

</head>

<body>

<div id="topo">
SEJA BEM VINDO À MAIS UMA TENTATIVA DE FAZER O TÉO SE SENTIR ESPECIAL!
</div>

<div id="container">
  <div id="texto"></div>
</div>

<input type="text" id="input" autofocus>

<div id="resultado"></div>

<script>
const textoOriginal = `In today's increasingly hectic and stressful world, getting a spa treatment is sometimes one of the most therapeutic things an individual can enjoy. The relaxation and peaceful environment associated with a spa can allow a person to regain their sense of balance.`;

const textoDiv = document.getElementById("texto");
const input = document.getElementById("input");
const resultado = document.getElementById("resultado");

let inicio = null;

// criar letras
textoOriginal.split("").forEach((letra, index) => {
  const span = document.createElement("span");
  span.innerText = letra;
  span.classList.add("letra");

  if (index === 0) span.classList.add("ativa");

  textoDiv.appendChild(span);
});

const letras = document.querySelectorAll(".letra);

// focar
document.body.addEventListener("click", () => input.focus());

input.addEventListener("input", () => {

  if (!inicio) inicio = new Date();

  const valor = input.value;

  letras.forEach((span, index) => {
    const digitado = valor[index];

    span.classList.remove("ativa");

    if (digitado == null) {
      span.classList.remove("correta", "errada");
    } 
    else if (digitado === span.innerText) {
      span.classList.add("correta");
      span.classList.remove("errada");
    } 
    else {
      span.classList.add("errada");
      span.classList.remove("correta");
    }

    if (index === valor.length) {
      span.classList.add("ativa");
    }
  });

  if (valor.length >= textoOriginal.length) {
    finalizar(valor);
  }
});

function finalizar(valor) {
  const fim = new Date();
  const tempo = (fim - inicio) / 1000;

  let erros = 0;
  let corretos = 0;

  letras.forEach(span => {
    if (span.classList.contains("errada")) erros++;
    if (span.classList.contains("correta")) corretos++;
  });

  const wpm = Math.round(((corretos / 5) / tempo) * 60);

  resultado.style.display = "block";

  resultado.innerHTML = `
    🎉 <b>RESULTADO</b><br><br>
    ⏱️ Tempo: ${tempo.toFixed(2)}s <br>
    ⚡ Velocidade média: ${wpm} WPM <br>
    ❌ Total de erros: ${erros} <br><br>
    💙 você terminou... do seu jeito 😏
  `;

  input.disabled = true;
}
</script>

</body>
</html>
