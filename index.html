<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema</title>

<style>
body{
    margin:0;
    background:black;
    font-family:Arial;
    color:white;
    overflow:hidden;
}

/* TELA */
#tela{
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* TEXTO */
#mensagem{
    font-size:22px;
    margin-bottom:15px;
    text-align:center;
}

/* CONTADOR */
#contador{
    font-size:26px;
    color:red;
    margin-bottom:20px;
}

/* BARRA */
#barra{
    width:70%;
    height:20px;
    border:1px solid red;
}

#progresso{
    height:100%;
    width:0%;
    background:red;
}

/* POPUP */
.popup{
    position:absolute;
    width:260px;
    background:#111;
    border:2px solid red;
    box-shadow:0 0 15px red;
    padding:10px;
    animation:tremer 0.2s infinite;
}

.popup h3{
    margin:0;
    color:red;
    font-size:14px;
}

.popup button{
    margin-top:10px;
    width:100%;
    background:red;
    color:white;
    border:none;
    padding:5px;
    cursor:pointer;
}

/* ANIMAÇÕES */
@keyframes tremer{
    0%{transform:translate(0,0);}
    25%{transform:translate(2px,-2px);}
    50%{transform:translate(-2px,2px);}
    75%{transform:translate(2px,2px);}
    100%{transform:translate(0,0);}
}

@keyframes piscar{
    0%{background:black;}
    50%{background:#200;}
    100%{background:black;}
}

.piscar{
    animation:piscar 0.3s infinite;
}

</style>
</head>

<body>

<div id="tela">
    <div id="mensagem">Inicializando sistema...</div>
    <div id="contador">05:00</div>
    <div id="barra">
        <div id="progresso"></div>
    </div>
</div>

<audio id="erro" src="https://www.myinstants.com/media/sounds/windows-error.mp3"></audio>

<script>

let progresso = 0;
const barra = document.getElementById("progresso");
const msg = document.getElementById("mensagem");
const som = document.getElementById("erro");

/* ⏳ CONTAGEM REGRESSIVA */
let tempo = 300; // 5 minutos

function atualizarContador(){
    let min = Math.floor(tempo / 60);
    let seg = tempo % 60;

    document.getElementById("contador").innerText =
        String(min).padStart(2,'0') + ":" + String(seg).padStart(2,'0');

    tempo--;

    if(tempo < 0){
        document.getElementById("contador").innerText = "00:00";
        msg.innerText = "RESET DE SEGURANÇA INICIADO...";
        criarMuitos();
    }
}

setInterval(atualizarContador, 1000);


/* PROGRESSO FAKE */
let intervalo = setInterval(()=>{
    progresso += Math.random()*10;
    barra.style.width = progresso + "%";

    if(progresso > 30){
        msg.innerText = "Verificando arquivos...";
    }

    if(progresso > 60){
        msg.innerText = "Detectando ameaças...";
    }

    if(progresso > 80){
        msg.innerText = "⚠ Seu dispositivo vai entrar em modo RESET DE SEGURANÇA";
        document.body.classList.add("piscar");
        som.play();
        criarPopupReset();
    }

    if(progresso >= 100){
        clearInterval(intervalo);
        msg.innerText = "FALHA CRÍTICA DO SISTEMA";
    }

}, 500);


/* POPUP NORMAL */
function criarPopup(){
    const p = document.createElement("div");
    p.className = "popup";

    p.style.top = Math.random()*80 + "%";
    p.style.left = Math.random()*80 + "%";

    p.innerHTML = `
        <h3>⚠ ERRO CRÍTICO</h3>
        <p>Dados sendo corrompidos...</p>
        <button>Fechar</button>
    `;

    p.querySelector("button").onclick = () => {
        p.remove();

        for(let i=0;i<3;i++){
            criarPopup();
        }
    };

    document.body.appendChild(p);
}

/* 💥 POPUP DO RESET */
function criarPopupReset(){
    const p = document.createElement("div");
    p.className = "popup";

    p.style.top = Math.random()*70 + "%";
    p.style.left = Math.random()*70 + "%";

    p.innerHTML = `
        <h3>⚠ RESET DE SEGURANÇA</h3>
        <p>Seu dispositivo será reiniciado automaticamente.</p>
        <p>Tempo restante: <span id="tempoPopup">05:00</span></p>
        <button>Cancelar</button>
    `;

    p.querySelector("button").onclick = () => {
        p.remove();
        criarPopupReset(); // não deixa escapar 😈
    };

    document.body.appendChild(p);
}

/* CAOS FINAL */
function criarMuitos(){
    setInterval(()=>{
        for(let i=0;i<5;i++){
            criarPopup();
        }
    }, 800);
}

</script>

</body>
</html>
