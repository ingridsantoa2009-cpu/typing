<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Typing da Ingrid 💙</title>

<style>
body {
  background: #ffffff;
  color: #333;
  font-family: "Segoe UI", Arial, sans-serif;
  margin: 0;
}

/* barra topo */
#topo {
  background: linear-gradient(to right, #2ea3c9, #1e7fa3);
  color: white;
  text-align: center;
  padding: 15px;
  font-size: 20px;
  font-weight: 600;
}

/* container geral */
#container {
  background: #e5e7eb;
  padding: 40px;
  border-radius: 15px;
  max-width: 1000px;
  margin: 40px auto 20px auto;
  font-size: 32px;
  font-family: monospace;
}

/* LINHAS (isso resolve tudo) */
.linha {
  border-bottom: 1px solid #d1d5db;
  padding-bottom: 5px;
  margin-bottom: 10px;
  line-height: 2.2;
}

/* letras */
.letra {
  color: #999;
}

.correta {
  color: #3b82f6;
}

.errada {
  color: #ef4444;
}

.ativa {
  border-bottom: 2px solid #3b82f6;
}

/* input invisível */
#input {
  opacity: 0;
  position: absolute;
}

/* resultado */
#resultado {
  background: #bfdbfe;
  color: #1e3a8a;
  padding: 25px;
  border-radius: 15px;
  max-width: 600px;
  margin: 20px auto;
  font-size: 20px;
  line-height: 1.8;
  display: none;
  text-align: center;
}
</style>

</head>

<body>

<div id="topo">
SEJA BEM VINDO À MAIS UMA TENTATIVA DE FAZER O TÉO SE SENTIR ESPECIAL!
</div>

<div id="container">
  <div id="texto"></div>
</div>

<input type="text" id="input" autofocus>

<div id="resultado"></div>

<script>
const textoOriginal = `In today's increasingly hectic and stressful world, getting a spa treatment is sometimes one of the most therapeutic things an individual can enjoy. The relaxation and peaceful environment associated with a spa can allow a person to regain their sense of balance.`;

const textoDiv = document.getElementById("texto");
const input = document.getElementById("input");
const resultado = document.getElementById("resultado");

let inicio = null;

// 👉 QUEBRA EM LINHAS
function dividirLinhas(texto, tamanho = 50) {
  const palavras = texto.split(" ");
  let linhas = [];
  let atual = "";

  palavras.forEach(p => {
    if ((atual + p).length > tamanho) {
      linhas.push(atual);
      atual = p + " ";
    } else {
      atual += p + " ";
    }
  });

  linhas.push(atual);
  return linhas;
}

// criar linhas + letras
const linhas = dividirLinhas(textoOriginal);

linhas.forEach((linhaTexto, linhaIndex) => {
  const divLinha = document.createElement("div");
  divLinha.classList.add("linha");

  linhaTexto.split("").forEach((letra, index) => {
    const span = document.createElement("span");
    span.innerText = letra;
    span.classList.add("letra");

    if (linhaIndex === 0 && index === 0) {
      span.classList.add("ativa");
    }

    divLinha.appendChild(span);
  });

  textoDiv.appendChild(divLinha);
});

const letras = document.querySelectorAll(".letra");

// focar
document.body.addEventListener("click", () => input.focus());

input.addEventListener("input", () => {

  if (!inicio) inicio = new Date();

  const valor = input.value;

  letras.forEach((span, index) => {
    const digitado = valor[index];

    span.classList.remove("ativa");

    if (digitado == null) {
      span.classList.remove("correta", "errada");
    } 
    else if (digitado === span.innerText) {
      span.classList.add("correta");
      span.classList.remove("errada");
    } 
    else {
      span.classList.add("errada");
      span.classList.remove("correta");
    }

    if (index === valor.length) {
      span.classList.add("ativa");
    }
  });

  if (valor.length >= textoOriginal.length) {
    finalizar(valor);
  }
});

function finalizar(valor) {
  const fim = new Date();
  const tempo = (fim - inicio) / 1000;

  let erros = 0;
  let corretos = 0;

  letras.forEach(span => {
    if (span.classList.contains("errada")) erros++;
    if (span.classList.contains("correta")) corretos++;
  });

  const wpm = Math.round(((corretos / 5) / tempo) * 60);

  resultado.style.display = "block";

  resultado.innerHTML = `
    🎉 <b>RESULTADO</b><br><br>
    ⏱️ Tempo: ${tempo.toFixed(2)}s <br>
    ⚡ Velocidade média: ${wpm} WPM <br>
    ❌ Total de erros: ${erros} <br><br>
    💙 você terminou... do seu jeito 😏
  `;

  input.disabled = true;
}
</script>

</body>
</html>
