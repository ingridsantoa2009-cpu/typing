<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Surpresa 🎁</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    overflow:hidden;
    background:#e6f0ff;
}

/* ===== TELA INICIAL ===== */
#tela{
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

#presente{
    width:120px;
    margin-bottom:20px;
}

#mensagem{
    font-size:22px;
    text-align:center;
}

#barra{
    width:250px;
    height:12px;
    background:#ccc;
    margin-top:20px;
    border-radius:10px;
}

#progresso{
    height:100%;
    width:0%;
    background:#4da6ff;
    border-radius:10px;
}

/* ===== POPUPS ===== */
.popup{
    position:absolute;
    width:260px;
    background:white;
    border:1px solid #999;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
    padding:10px;
    font-size:14px;
}

.top-left{ top:5%; left:5%; }
.top-right{ top:5%; right:5%; }
.bottom-left{ bottom:5%; left:5%; }
.bottom-right{ bottom:5%; right:5%; }
.center{ top:40%; left:40%; }

.popup h3{
    margin:0;
    font-size:14px;
    background:#f0f0f0;
    padding:5px;
}

/* ===== HACK ===== */
#hack{
    position:fixed;
    width:100%;
    height:100%;
    background:#020000;
    color:#ff2b2b;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

#timerFinal{
    font-size:100px;
    color:red;
}

/* ===== POPUPS FINAIS MAIS SINISTROS ===== */
.popupFinal{
    position:absolute;
    width:240px;
    background:#0a0000;
    border:3px solid red;
    box-shadow:0 0 25px red;
    color:white;
    padding:12px;
    font-size:13px;
    animation:tremer 0.08s infinite;
}

/* TREMER MAIS FORTE */
@keyframes tremer{
    0%{transform:translate(0,0);}
    25%{transform:translate(4px,-4px);}
    50%{transform:translate(-4px,4px);}
    75%{transform:translate(4px,4px);}
    100%{transform:translate(0,0);}
}

/* ===== RESET ===== */
#resetando{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    color:white;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* ===== FINAL ENGRAÇADO ===== */
#final{
    position:fixed;
    width:100%;
    height:100%;
    background:#e6f0ff;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-size:40px;
    text-align:center;
}

/* ANIMAÇÃO DO TEXTO */
@keyframes bounce{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

#final h1{
    animation:bounce 1s infinite;
}

/* HEHE BOY */
#hehe{
    font-size:60px;
    margin-top:20px;
    animation:spin 2s infinite linear;
}

@keyframes spin{
    from{transform:rotate(0);}
    to{transform:rotate(360deg);}
}

</style>
</head>

<body>

<!-- INÍCIO -->
<div id="tela">
    <img id="presente" src="https://cdn-icons-png.flaticon.com/512/869/869636.png">
    <div id="mensagem">Preparando algo especial...</div>
    <div id="barra"><div id="progresso"></div></div>
</div>

<!-- HACK -->
<div id="hack">
    <h2>⚠ SISTEMA COMPROMETIDO</h2>
    <p>Todos os arquivos serão apagados</p>
    <div id="timerFinal">00:10</div>
</div>

<!-- RESET -->
<div id="resetando">
    <h2>Resetando o sistema...</h2>
</div>

<!-- FINAL -->
<div id="final">
    <h1>ingrid trolou você 😈</h1>
    <div id="hehe">😏</div>
</div>

<script>

/* CARREGAMENTO */
let progresso = 0;
let load = setInterval(()=>{
    progresso += Math.random()*10;
    document.getElementById("progresso").style.width = progresso + "%";

    if(progresso >= 100){
        clearInterval(load);
        document.getElementById("mensagem").innerHTML =
        "💙 eu preparei isso com carinho pra você...";
        setTimeout(iniciarLeves, 5000);
    }
},400);

/* POPUPS */
let posicoes = ["top-left","top-right","bottom-left","bottom-right","center"];
let iPos = 0;

function criarPopup(txt){
    let p = document.createElement("div");
    p.className = "popup " + posicoes[iPos];
    iPos = (iPos+1)%posicoes.length;

    p.innerHTML = `<h3>Sistema</h3><p>${txt}</p>`;
    document.body.appendChild(p);
}

/* LEVES */
function iniciarLeves(){
    let msgs=["Carregando...","Sincronizando...","Finalizando..."];
    let i=0;

    let t=setInterval(()=>{
        if(i>=msgs.length){clearInterval(t);setTimeout(iniciarPesados,5000);return;}
        criarPopup(msgs[i]); i++;
    },2000);
}

/* PESADOS */
function iniciarPesados(){
    let msgs=["Erro detectado","Arquivo corrompido","Falha crítica","Sistema instável"];
    let i=0;

    let t=setInterval(()=>{
        if(i>=msgs.length){clearInterval(t);iniciarHack();return;}
        criarPopup(msgs[i]); i++;
    },1500);
}

/* LIMPAR */
function limpar(){
    document.querySelectorAll(".popup").forEach(e=>e.remove());
}

/* POPUP FINAL */
function popupFinal(){
    let p=document.createElement("div");
    p.className="popupFinal";

    let pos=[
        {top:"2%",left:"2%"},
        {top:"2%",right:"2%"},
        {bottom:"2%",left:"2%"},
        {bottom:"2%",right:"2%"},
        {top:"40%",left:"2%"},
        {top:"40%",right:"2%"}
    ];

    Object.assign(p.style,pos[Math.floor(Math.random()*pos.length)]);
    p.innerHTML="ERRO CRÍTICO<br>SISTEMA INVADIDO";

    document.body.appendChild(p);
}

/* HACK */
function iniciarHack(){
    limpar();
    tela.style.display="none";
    hack.style.display="flex";

    let tempo=10;

    for(let i=0;i<6;i++) popupFinal();

    let caos=setInterval(popupFinal,300);

    let timer=setInterval(()=>{
        timerFinal.innerText="00:"+String(tempo).padStart(2,'0');
        tempo--;

        if(tempo<0){
            clearInterval(timer);
            clearInterval(caos);
            iniciarReset();
        }
    },1000);
}

/* RESET */
function iniciarReset(){
    document.querySelectorAll(".popupFinal").forEach(e=>e.remove());
    hack.style.display="none";
    resetando.style.display="flex";

    setTimeout(()=>{
        resetando.style.display="none";
        final.style.display="flex";
    },5000);
}

</script>

</body>
</html>
