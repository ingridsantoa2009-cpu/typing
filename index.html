<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Surpresa 🎁</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    overflow:hidden;
    background:#e6f0ff;
}

/* TELA INICIAL */
#tela{
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* PRESENTE */
#presente{
    width:120px;
    margin-bottom:20px;
}

/* TEXTO */
#mensagem{
    font-size:22px;
    text-align:center;
}

/* BARRA */
#barra{
    width:250px;
    height:12px;
    background:#ccc;
    margin-top:20px;
    border-radius:10px;
}

#progresso{
    height:100%;
    width:0%;
    background:#4da6ff;
    border-radius:10px;
}

/* POPUP */
.popup{
    position:absolute;
    width:260px;
    background:white;
    border:1px solid #999;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
    padding:10px;
    font-size:14px;
}

/* POSIÇÕES FIXAS */
.top-left{ top:5%; left:5%; }
.top-right{ top:5%; right:5%; }
.bottom-left{ bottom:5%; left:5%; }
.bottom-right{ bottom:5%; right:5%; }
.center{ top:40%; left:40%; }

.popup h3{
    margin:0;
    font-size:14px;
    background:#f0f0f0;
    padding:5px;
}

.popup button{
    margin-top:10px;
    float:right;
}

/* TELA FINAL */
#hack{
    position:fixed;
    width:100%;
    height:100%;
    background:#0a0d14;
    color:#00d0ff;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

#hack h2{
    color:#ff3b3b;
}

#timerFinal{
    font-size:50px;
    color:red;
    margin-top:20px;
}

/* FINAL FOFO */
#final{
    position:fixed;
    width:100%;
    height:100%;
    background:#e6f0ff;
    display:none;
    justify-content:center;
    align-items:center;
    font-size:30px;
    color:#333;
}

</style>
</head>

<body>

<div id="tela">
    <img id="presente" src="https://cdn-icons-png.flaticon.com/512/869/869636.png">
    <div id="mensagem">Preparando algo especial...</div>
    <div id="barra"><div id="progresso"></div></div>
</div>

<div id="hack">
    <h2>⚠ ACESSO NÃO AUTORIZADO</h2>
    <p>Atividade suspeita detectada no dispositivo.</p>
    <p>Arquivos críticos podem ser perdidos.</p>
    <div id="timerFinal">00:05</div>
</div>

<div id="final">
    ingrid trolou você 💙
</div>

<script>

let progresso = 0;
const barra = document.getElementById("progresso");
const msg = document.getElementById("mensagem");

/* CARREGAMENTO */
let load = setInterval(()=>{
    progresso += Math.random()*10;
    barra.style.width = progresso + "%";

    if(progresso >= 100){
        clearInterval(load);
        msg.innerHTML = "💙 eu preparei isso com carinho pra você...";
        setTimeout(iniciarLeves, 5000);
    }

},400);


/* POSIÇÕES */
let posicoes = ["top-left","top-right","bottom-left","bottom-right","center"];
let posIndex = 0;

/* POPUP */
function criarPopup(texto){
    const p = document.createElement("div");
    p.className = "popup " + posicoes[posIndex];

    posIndex = (posIndex + 1) % posicoes.length;

    p.innerHTML = `
        <h3>Sistema</h3>
        <p>${texto}</p>
        <button>OK</button>
    `;

    p.querySelector("button").onclick = () => p.remove();

    document.body.appendChild(p);
}


/* POPUPS LEVES */
function iniciarLeves(){
    let msgs = [
        "Carregando conteúdo...",
        "Sincronizando dados...",
        "Aplicando configurações..."
    ];

    let i = 0;

    let intervalo = setInterval(()=>{
        if(i >= msgs.length){
            clearInterval(intervalo);
            setTimeout(iniciarPesados, 5000);
            return;
        }

        criarPopup(msgs[i]);
        i++;
    },2000);
}


/* POPUPS PESADOS */
function iniciarPesados(){
    let msgs = [
        "Erro inesperado detectado.",
        "Falha no sistema.",
        "Arquivo corrompido.",
        "Permissões alteradas."
    ];

    let i = 0;

    let intervalo = setInterval(()=>{
        if(i >= msgs.length){
            clearInterval(intervalo);
            iniciarHack();
            return;
        }

        criarPopup(msgs[i]);
        i++;
    },1500);
}


/* LIMPAR POPUPS */
function limparPopups(){
    document.querySelectorAll(".popup").forEach(p=>p.remove());
}


/* TELA FINAL */
function iniciarHack(){
    limparPopups();
    document.getElementById("tela").style.display = "none";
    document.getElementById("hack").style.display = "flex";

    let tempo = 5;

    let timer = setInterval(()=>{
        document.getElementById("timerFinal").innerText =
            "00:0" + tempo;

        tempo--;

        if(tempo < 0){
            clearInterval(timer);
            mostrarFinal();
        }

    },1000);
}


/* FINAL FOFO */
function mostrarFinal(){
    document.getElementById("hack").style.display = "none";
    document.getElementById("final").style.display = "flex";
}

</script>

</body>
</html>
