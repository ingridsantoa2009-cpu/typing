<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Typing da Ingrid 💙</title>

<style>
body {
  background: white;
  color: #6b7280;
  font-family: monospace;
  padding: 40px;
  text-align: center;
}

#container {
  max-width: 800px;
  margin: auto;
  line-height: 1.8;
  font-size: 26px;
}

.letra {
  color: #6b7280;
}

.correta {
  color: #2563eb;
}

.errada {
  color: #2563eb;
  border-bottom: 2px solid #2563eb;
}

.ativa {
  border-bottom: 2px solid #2563eb;
}

#texto {
  border-bottom: 1px solid #d1d5db;
  padding-bottom: 10px;
  min-height: 40px;
}

#resultado {
  margin-top: 20px;
  font-size: 20px;
  color: #2563eb;
}
</style>

</head>

<body>

<div id="container">
  <div id="texto"></div>
  <div id="resultado"></div>
</div>

<audio id="som" src="https://assets.mixkit.co/sfx/preview/mixkit-typewriter-soft-click-1125.mp3"></audio>

<script>
const intro = "o site está sendo testado";
const fraseJogo = "o site está sendo testado";

const textoDiv = document.getElementById("texto");
const resultadoDiv = document.getElementById("resultado");
const som = document.getElementById("som");

let liberado = false;

// desbloquear áudio
document.body.addEventListener("click", () => {
  som.play().then(() => {
    som.pause();
    som.currentTime = 0;
    liberado = true;
  });
}, { once: true });

// ================= INTRO =================
let i = 0;

function digitarIntro() {
  if (i < intro.length) {
    const span = document.createElement("span");
    span.innerText = intro[i];
    span.classList.add("letra");
    textoDiv.appendChild(span);

    if (liberado) {
      som.currentTime = 0;
      som.play();
    }

    i++;
    setTimeout(digitarIntro, 70);
  } else {
    setTimeout(iniciarJogo, 1000);
  }
}

// ================= JOGO =================
let index = 0;
let erros = 0;
let inicio = null;

function iniciarJogo() {
  textoDiv.innerHTML = "";
  resultadoDiv.innerHTML = "";

  fraseJogo.split("").forEach(letra => {
    const span = document.createElement("span");
    span.innerText = letra;
    span.classList.add("letra");
    textoDiv.appendChild(span);
  });

  textoDiv.children[0].classList.add("ativa");

  document.addEventListener("keydown", digitar);
}

function digitar(e) {
  if (!inicio) inicio = new Date();

  const letras = textoDiv.querySelectorAll("span");
  const letraAtual = letras[index];

  if (!letraAtual) return;

  if (liberado) {
    som.currentTime = 0;
    som.play();
  }

  if (e.key === letraAtual.innerText) {
    letraAtual.classList.add("correta");
  } else {
    letraAtual.classList.add("errada");
    erros++;
  }

  letraAtual.classList.remove("ativa");
  index++;

  if (letras[index]) {
    letras[index].classList.add("ativa");
  } else {
    finalizar();
  }
}

// ================= RESULTADO =================
function finalizar() {
  const fim = new Date();
  const tempo = (fim - inicio) / 1000;

  const palavras = fraseJogo.split(" ").length;
  const wpm = Math.round((palavras / tempo) * 60);
  const precisao = Math.round(((fraseJogo.length - erros) / fraseJogo.length) * 100);

  resultadoDiv.innerHTML = `
    ⏱ Tempo: ${tempo.toFixed(1)}s <br>
    ⚡ Velocidade: ${wpm} WPM <br>
    ❌ Erros: ${erros} <br>
    🎯 Precisão: ${precisao}%
  `;
}

// iniciar intro
digitarIntro();
</script>

</body>
</html>
