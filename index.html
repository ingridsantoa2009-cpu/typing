<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Surpresa 🎁</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    overflow:hidden;
    background:#e6f0ff;
}

/* CENTRAL */
#tela{
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* PRESENTE */
#presente{
    width:120px;
    margin-bottom:20px;
}

/* TEXTO */
#mensagem{
    font-size:22px;
    text-align:center;
}

/* BARRA */
#barra{
    width:250px;
    height:12px;
    background:#ccc;
    margin-top:20px;
    border-radius:10px;
}

#progresso{
    height:100%;
    width:0%;
    background:#4da6ff;
    border-radius:10px;
}

/* POPUP */
.popup{
    position:absolute;
    width:260px;
    background:white;
    border:1px solid #999;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
    padding:10px;
    font-size:14px;
}

.popup h3{
    margin:0;
    font-size:14px;
    background:#f0f0f0;
    padding:5px;
}

.popup button{
    margin-top:10px;
    float:right;
}

/* TELA FINAL */
#hack{
    position:fixed;
    width:100%;
    height:100%;
    background:#0b0f1a;
    color:#00c3ff;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

#timerFinal{
    font-size:40px;
    color:red;
    margin-top:20px;
}

</style>
</head>

<body>

<div id="tela">
    <img id="presente" src="https://cdn-icons-png.flaticon.com/512/869/869636.png">
    <div id="mensagem">Preparando algo especial...</div>
    <div id="barra"><div id="progresso"></div></div>
</div>

<div id="hack">
    <h2>⚠ ACESSO NÃO AUTORIZADO DETECTADO</h2>
    <p>Uma atividade suspeita foi identificada no sistema.</p>
    <p>Seus arquivos estão em risco de exclusão permanente.</p>
    <div id="timerFinal">01:00</div>
</div>

<script>

let progresso = 0;
const barra = document.getElementById("progresso");
const msg = document.getElementById("mensagem");

/* CARREGAMENTO FOFO */
let load = setInterval(()=>{
    progresso += Math.random()*10;
    barra.style.width = progresso + "%";

    if(progresso >= 100){
        clearInterval(load);
        mostrarMensagemFofo();
    }

},400);


/* 💌 MENSAGEM FOFA */
function mostrarMensagemFofo(){
    msg.innerHTML = "💙 eu preparei isso com carinho pra você...<br>espero que goste :)";

    setTimeout(iniciarPopupsLeves, 10000);
}


/* 🙂 POPUPS LEVES */
let leves = [
"Carregando conteúdo...",
"Ajustando configurações...",
"Sincronizando dados...",
"Finalizando detalhes..."
];

function iniciarPopupsLeves(){
    let i = 0;

    let intervalo = setInterval(()=>{
        if(i >= leves.length){
            clearInterval(intervalo);
            setTimeout(iniciarPopupsPesados, 10000);
            return;
        }

        criarPopup(leves[i]);
        i++;
    },2000);
}


/* 😰 POPUPS PESADOS */
let pesados = [
"Erro ao carregar arquivos.",
"Falha inesperada detectada.",
"Arquivo corrompido.",
"Permissões alteradas automaticamente.",
"Sistema instável."
];

function iniciarPopupsPesados(){
    let i = 0;

    let intervalo = setInterval(()=>{
        if(i >= pesados.length){
            clearInterval(intervalo);
            iniciarHack();
            return;
        }

        criarPopup(pesados[i]);
        i++;
    },1500);
}


/* POPUP */
function criarPopup(texto){
    const p = document.createElement("div");
    p.className = "popup";

    p.style.top = Math.random()*70 + "%";
    p.style.left = Math.random()*70 + "%";

    p.innerHTML = `
        <h3>Sistema</h3>
        <p>${texto}</p>
        <button>OK</button>
    `;

    p.querySelector("button").onclick = () => p.remove();

    document.body.appendChild(p);
}


/* 💀 TELA FINAL */
function iniciarHack(){
    document.getElementById("tela").style.display = "none";
    document.getElementById("hack").style.display = "flex";

    let tempo = 60;

    setInterval(()=>{
        let min = Math.floor(tempo/60);
        let seg = tempo % 60;

        document.getElementById("timerFinal").innerText =
            "00:" + String(seg).padStart(2,'0');

        tempo--;

    },1000);
}

</script>

</body>
</html>
