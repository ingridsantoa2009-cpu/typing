<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Erro do Sistema</title>

<style>
body{
    margin:0;
    background:black;
    font-family:Arial;
    overflow:hidden;
}

/* POPUP */
.popup{
    position:absolute;
    width:220px;
    background:white;
    border:2px solid red;
    box-shadow:0 0 10px red;
    padding:10px;
    animation:tremer 0.2s infinite;
}

.popup h3{
    margin:0;
    font-size:14px;
    color:red;
}

.popup button{
    margin-top:10px;
    width:100%;
    cursor:pointer;
}

/* ANIMAÇÃO DE BUG */
@keyframes tremer{
    0%{transform:translate(0px,0px);}
    25%{transform:translate(2px,-2px);}
    50%{transform:translate(-2px,2px);}
    75%{transform:translate(2px,2px);}
    100%{transform:translate(0px,0px);}
}
</style>
</head>

<body>

<script>

function criarPopup(){
    const popup = document.createElement("div");
    popup.className = "popup";

    popup.style.top = Math.random()*80 + "%";
    popup.style.left = Math.random()*80 + "%";

    popup.innerHTML = `
        <h3>⚠ ERRO CRÍTICO</h3>
        <p>Sistema corrompido!</p>
        <button>Fechar</button>
    `;

    popup.querySelector("button").onclick = () => {
        popup.remove();

        // quando fecha UM... surgem MAIS 😈
        for(let i=0;i<2;i++){
            criarPopup();
        }
    };

    document.body.appendChild(popup);
}

// começa com alguns
for(let i=0;i<5;i++){
    criarPopup();
}

// spawn infinito de bugs
setInterval(()=>{
    criarPopup();
}, 2000);

</script>

</body>
</html>
